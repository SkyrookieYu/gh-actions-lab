name: Claude PR Review

# 觸發條件：PR 被開啟或更新時
# opened = PR 第一次被建立
# synchronize = PR 已開著，有人 push 新 commit 到來源分支
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    # Claude 留言會觸發 synchronize 事件，導致 workflow 再次被觸發
    # 這個條件防止無限迴圈：Claude → 留言 → 觸發 → Claude → 留言 → ...
    if: github.actor != 'claude[bot]'

    # 授予 Action 的權限（最小權限原則）
    permissions:
      contents: read          # 讀取 repo 內容
      pull-requests: write    # 在 PR 留言
      id-token: write         # OIDC 認證（某些 provider 需要）

    steps:
      # Step 1: 拉取程式碼
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 必須拉完整歷史！fetch-depth: 1 只有一個 commit，
          # Claude 看不到 base branch，無法算出完整的 diff
          fetch-depth: 0

      # Step 2: 跑 Claude Code Action
      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          # Anthropic API Key（你在 Step 2 設定的 secret）
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # GitHub Token（自動產生，不需要另外建 secret）
          # 讓 Claude 能透過 GitHub API 在 PR 上留言
          # 少了這行，Claude 跑完但無法把結果寫回 PR！
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # CI 環境是非互動式的，沒有人能按 Y 批准工具權限
          # 少了這行，Claude 會卡在「需要您允許執行 gh 命令」然後超時
          # 安全的：GitHub runner 是臨時虛擬機，跑完就銷毀
          claude_args: "--dangerously-skip-permissions"

          # 自動把 Claude 的最終輸出貼到 PR 作為 comment
          # 即使 Claude 沒主動用 GitHub 工具留言，也會貼上去
          # true = 每次更新同一則留言（不會洗版）
          use_sticky_comment: true

          # 顯示完整輸出（方便 debug，確認穩定後可改為 false）
          show_full_output: true

          # Review 指示（可用中文，Claude 會用中文回覆）
          prompt: |
            請 review 這個 PR 的程式碼變更，重點關注：
            1. 程式碼品質與 Python 最佳實踐
            2. 潛在的 bug 或邏輯問題
            3. 邊界條件是否有處理
            4. 測試覆蓋率是否足夠

            用繁體中文回覆。

            重要：請使用 GitHub 工具將你的 review 結果發表為 PR comment。
            如果有針對特定程式碼行的建議，請使用 inline review comment。
